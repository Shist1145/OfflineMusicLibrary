name: Build OfflineMusicLibrary 1.2

on:
  push:
    branches: [main]
    tags: [v1.2, v1.2.0]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Run deterministic tests
        run: dotnet test release/OfflineMusicLibrary.Tests/OfflineMusicLibrary.Tests.csproj -c Release -r win-x64 --filter "Category!=Integration"
      - name: Publish Windows 1.2
        run: dotnet publish OfflineMusicLibrary.csproj -c Release -r win-x64 --self-contained true -o artifacts/windows
      - name: Create Windows archive
        shell: pwsh
        run: Compress-Archive -Path artifacts/windows/* -DestinationPath artifacts/OfflineMusicLibrary-1.2-windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: OfflineMusicLibrary-1.2-windows-x64
          path: artifacts/OfflineMusicLibrary-1.2-windows-x64.zip

  unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: OfflineMusicLibrary-1.2-linux-x64
            kind: linux
          - os: macos-15
            rid: osx-arm64
            artifact: OfflineMusicLibrary-1.2-macos-arm64
            kind: macos
          - os: macos-15-intel
            rid: osx-x64
            artifact: OfflineMusicLibrary-1.2-macos-x64
            kind: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Publish cross-platform app
        run: dotnet publish CrossPlatform/OfflineMusicLibrary.CrossPlatform.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o artifacts/publish
      - name: Package Linux
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          cp packaging/linux/README.txt artifacts/publish/
          cp packaging/linux/offline-music-library.desktop artifacts/publish/
          chmod +x artifacts/publish/OfflineMusicLibrary
          tar -czf artifacts/${{ matrix.artifact }}.tar.gz -C artifacts/publish .
      - name: Package macOS app
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          APP="artifacts/本地音乐库.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R artifacts/publish/. "$APP/Contents/MacOS/"
          cp packaging/macos/Info.plist "$APP/Contents/Info.plist"
          cp packaging/macos/README.txt "$APP/Contents/Resources/"
          chmod +x "$APP/Contents/MacOS/OfflineMusicLibrary"
          codesign --force --deep --sign - "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "artifacts/${{ matrix.artifact }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}.*

  release:
    if: startsWith(github.ref, 'refs/tags/v1.2')
    needs: [windows, unix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --title "本地音乐库 1.2" --generate-notes
